; ============================================================
; pgbouncer.ini — RPG Server 连接池配置
;
; 架构说明:
;   N 个 rpg-server Pod(k8s 下 3-10 副本,每副本 max_pool_size=5)
;   → pgbouncer(单节点或独立副本)
;   → PostgreSQL(max_connections 通常 100-200)
;
; 为何用 transaction 模式:
;   sqlx 的 acquire/release 完全匹配 transaction 边界。
;   10 副本 × 每副本 5 连接 = 50 "活跃" server 连接,
;   pgbouncer 可同时服务 max_client_conn=1000 个客户端连接,
;   服务端真实连接始终 ≤ default_pool_size(20),
;   有效避免打满 PG max_connections,同时保留高并发吞吐。
;
; 注意:transaction 模式下不可使用 SET/advisory locks/
;   LISTEN/NOTIFY 等会话级特性;如需使用请切 session 模式。
; ============================================================

[databases]
; 格式: <client_db_name> = host=<pg_host> port=5432 dbname=<actual_db>
rpg = host=postgres port=5432 dbname=rpg

[pgbouncer]
; ─── 监听 ────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

; ─── 认证 ────────────────────────────────────────────────────
; userlist.txt 存储 hashed 密码,不明文写入此文件
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ─── 连接池模式 ───────────────────────────────────────────────
; transaction: 事务结束即归还 server 连接,适合短事务高并发
pool_mode = transaction

; ─── 连接数限制 ───────────────────────────────────────────────
; 客户端最大并发连接数(所有数据库)
max_client_conn = 1000

; 每个 (user, database) 对的 server 连接池大小
; 3-10 副本 × sqlx pool_size=5 = 最多 50 server 连接,设 20 留余量
default_pool_size = 20

; 预留连接池(处理突发高峰)
reserve_pool_size = 5
reserve_pool_timeout = 3

; 最小连接保活
min_pool_size = 5

; ─── 超时配置 ─────────────────────────────────────────────────
; 空闲 server 连接超时(秒)
server_idle_timeout = 600

; server 端连接生命周期(秒),0=不限
server_lifetime = 3600

; 客户端连接获取超时(秒)
query_wait_timeout = 30

; ─── 运维 / 管理 ──────────────────────────────────────────────
; 管理控制台(仅本机 Unix socket 或白名单 IP 可连)
admin_users = rpg_admin
stats_users = rpg_admin

; ─── 日志 ────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; ─── TLS(生产环境建议开启) ────────────────────────────────────
; server_tls_sslmode = require
; server_tls_ca_file = /etc/ssl/certs/ca-certificates.crt
