# RPG Roleplay 测试服 — nginx 主配置
# 配合 conf.d/rpg-roleplay.conf 使用

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── 日志(包含真实客户端 IP)──────────────────────────────────────────
    log_format main_cf '$remote_addr [$http_cf_connecting_ip] - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main_cf;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── 客户端真实 IP(从 CF 拿)─────────────────────────────────────────
    # CF 把客户端 IP 放在 CF-Connecting-IP 头,trusted_proxies 才允许该头生效
    real_ip_header CF-Connecting-IP;
    # Cloudflare IPv4 段(2024 列表 — 部署时 curl https://www.cloudflare.com/ips-v4 取最新)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # ── gzip 压缩 ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;
    gzip_min_length 1024;

    # ── SSE 友好 ────────────────────────────────────────────────────────
    # game 流式响应 + 政策通知 fetch 要长连接
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # ── 加载 server 块 ──────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
