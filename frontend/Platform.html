<body data-screen-label="Platform">
  <!-- 首屏 splash:JS bundle 下载期间避免白屏,body.platform-mounted 后 fade-out -->
  <style>
    #platform-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg, #121110); color: var(--text, #c8c2b7);
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      z-index: 1; transition: opacity .25s ease-out;
    }
    #platform-splash .spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(201, 100, 66, .25);
      border-top-color: var(--accent, #c96442);
      border-radius: 50%;
      animation: plt-spin .85s linear infinite;
      margin-bottom: 18px;
    }
    #platform-splash .label { font-size: 14px; opacity: .72; letter-spacing: .04em; }
    @keyframes plt-spin { to { transform: rotate(360deg); } }
    body.platform-mounted #platform-splash { opacity: 0; pointer-events: none; }
  </style>
  <div id="platform-splash">
    <div class="spinner" aria-hidden="true"></div>
    <div class="label">加载中…</div>
  </div>

  <div id="root"></div>

  <!-- Vite ESM 入口：替代原先多条 text/babel 脚本，按顺序 import 所有依赖并挂载 React 根 -->
  <script type="module" src="src/entries/platform.jsx"></script>
</body>
</html>
