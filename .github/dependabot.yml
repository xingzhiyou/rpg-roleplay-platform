version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/rpg"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      frontend-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
