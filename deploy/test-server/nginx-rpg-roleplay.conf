# rpg-roleplay.stellatrix.icu — 测试服 server 配置
#
# 三层 IP 白名单方案:
#   1. CF WAF Firewall Rule (边缘,最强) — 在 Cloudflare dashboard 配,见 README §3
#   2. ECS06 iptables — 只允许 CF IP 段进入 443/80,见 README §4
#   3. 这里 nginx 应用层 — 检查 CF-Connecting-IP == 154.29.152.100
#
# CF-Connecting-IP 由前面 nginx.conf 的 real_ip_header 已经透传成 $remote_addr

# ── 80 → 强制 301 跳 443(防裸 IP 访问)─────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://rpg-roleplay.stellatrix.icu$request_uri;
}

# ── 443 主入口 ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rpg-roleplay.stellatrix.icu;

    # ── TLS(CF Origin 证书,15 年自签 CF 承认)─────────────────────
    ssl_certificate     /etc/nginx/certs/rpg-roleplay.cert.pem;
    ssl_certificate_key /etc/nginx/certs/rpg-roleplay.key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 第三层 IP 白名单(应用层兜底)─────────────────────────────
    # CF-Connecting-IP 已被 nginx.conf 的 real_ip_header 提升成 $remote_addr
    set $allow_access "no";
    if ($remote_addr = "154.29.152.100") { set $allow_access "yes"; }
    if ($remote_addr = "126.147.250.143") { set $allow_access "yes"; }
    if ($allow_access = "no") {
        # 静态 451 页:测试期不展示真实服务
        return 451;
    }

    # ── 反代 backend(docker 内网)──────────────────────────────────
    location / {
        proxy_pass http://backend:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        # SSE / 长连接(状态流 / 政策通知)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";

        # 上传路径放宽 body 限制(50MB)
        client_max_body_size 50m;
    }

    # ── 健康检查端点不走 IP 白名单(供 CF/uptime 探测)──────────────
    location = /healthz {
        access_log off;
        proxy_pass http://backend:7860/api/state;
    }

    # ── 静态资源缓存(frontend dist 已被 backend 同源挂载)──────────
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        proxy_pass http://backend:7860;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
